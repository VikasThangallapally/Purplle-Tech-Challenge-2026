services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: retail_intelligence
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: ..
      dockerfile: docker/dashboard.Dockerfile
    env_file:
      - ../.env
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:
